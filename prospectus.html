<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Prospectus | Aura Galleria</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--color-bg);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: var(--font-body);
        }

        .prospectus-wrapper {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .prospectus-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            background: linear-gradient(to right, #fff, var(--color-accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .prospectus-desc {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .email-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            padding: 1rem 0;
            text-align: center;
            outline: none;
            font-family: var(--font-body);
            transition: border-color 0.3s ease;
        }

        .email-input:focus {
            border-bottom-color: var(--color-accent-gold);
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .dynamic-state {
            height: 60px; /* Fixed height to prevent layout shift */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
        }

        /* Wait State */
        .wait-state {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--color-text-muted);
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            transition: opacity 0.3s ease;
        }

        .wait-spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(197, 168, 128, 0.3);
            border-top-color: var(--color-accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Submit Button */
        .submit-btn {
            background: var(--color-accent-gold);
            color: #000;
            border: none;
            padding: 1rem 3rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            display: none; /* Hidden by default */
            opacity: 0;
            transform: translateY(10px);
        }

        .submit-btn.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(197, 168, 128, 0.3);
        }

        /* Global Nav Override to match simple page */
        #global-nav {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 100;
        }
        .nav-logo a { color: #fff; text-decoration: none; font-family: var(--font-heading); font-size: 1.5rem; font-weight: 600; letter-spacing: 0.2em;}
        .nav-back a { color: #fff; text-decoration: none; font-size: 0.9rem; letter-spacing: 0.1em; opacity: 0.7; transition: opacity 0.3s; }
        .nav-back a:hover { opacity: 1; }

        /* Responsive */
        @media (max-width: 1024px) {
            #global-nav { padding: 1.5rem 2rem; }
            .prospectus-title { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            #global-nav { padding: 1rem; flex-direction: column; gap: 1rem; align-items: center; }
            .prospectus-title { font-size: 2rem; }
            .prospectus-desc { font-size: 0.9rem; }
            .email-input { font-size: 1.2rem; }
            .submit-btn { padding: 1rem 2rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav id="global-nav">
        <div class="nav-logo"><a href="index.html">AURA</a></div>
        <div class="nav-back"><a href="index.html">RETURN TO EXPERIENCE</a></div>
    </nav>

    <div class="prospectus-wrapper">
        <h1 class="prospectus-title">ACCESS THE VISION</h1>
        <p class="prospectus-desc">Enter your email address to securely download the comprehensive Aura Galleria prospectus and investment documentation.</p>
        
        <div class="input-group">
            <input type="email" id="email-input" class="email-input" placeholder="ENTER EMAIL ADDRESS">
        </div>

        <div class="dynamic-state">
            <div class="wait-state" id="wait-state">
                <div class="wait-spinner"></div>
                AWAITING INPUT...
            </div>
            <button class="submit-btn" id="submit-btn">DOWNLOAD PROSPECTUS</button>
        </div>
    </div>

    <!-- Thank You Overlay -->
    <div id="thank-you-overlay">
        <h2 class="overlay-title">THANK YOU</h2>
        <p class="overlay-desc">Your prospectus is being processed. Returning to the global stage...</p>
    </div>

    <script>
        const emailInput = document.getElementById('email-input');
        const waitState = document.getElementById('wait-state');
        const submitBtn = document.getElementById('submit-btn');
        const overlay = document.getElementById('thank-you-overlay');

        // Simple email validation regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        emailInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            
            if (val.length > 0 && emailRegex.test(val)) {
                // Hide wait state, show submit button
                waitState.style.display = 'none';
                submitBtn.classList.add('show');
            } else {
                // Show wait state, hide submit button
                waitState.style.display = 'flex';
                submitBtn.classList.remove('show');
            }
        });

        submitBtn.addEventListener('click', () => {
            // Show Overlay
            overlay.classList.add("active");
            
            // Wait 3 seconds, then redirect
            setTimeout(() => {
                window.location.href = 'index.html#scene-1';
            }, 3000);
        });
    </script>
</body>
</html>
